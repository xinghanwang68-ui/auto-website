name: Daily Web Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# 核心修正 1：明確告訴 GitHub Actions 這個機器人擁有發布網頁的權限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install google-genai

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python generate.py

    # 核心修正 2：使用官方推薦的步驟打包並上傳網頁成果
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./ # 打包當前目錄下的 index.html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 # 真正呼叫官方 Actions 發布
